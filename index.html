<!DOCTYPE html>
<html lang="eo">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Gova" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <title>Gova</title>
</head>
<body>

  <!-- Tutekrana tuŝ-areo -->
  <main id="main" class="fullscreen-tap-area" aria-label="Alteco">
    <div class="altitude-display">
      <span id="altitude-value" class="altitude-value" aria-live="polite" aria-atomic="true">—</span>
      <span id="altitude-unit" class="altitude-unit">m</span>
    </div>
    
    <!-- Subtilaj indikiloj -->
    <div id="status-indicator" class="status-indicator" data-state="searching" aria-hidden="true"></div>
    <div id="base-indicator" class="base-indicator hidden" aria-label="Relativa reĝimo">Δ</div>
  </main>

  <!-- Agorda Folio (glitas supren je longpremo) -->
  <div id="settings-overlay" class="settings-overlay hidden" role="dialog" aria-modal="true" aria-label="Agordoj">
    <div id="settings-sheet" class="settings-sheet">
      
      <div class="settings-handle" aria-hidden="true"></div>

      <!-- GPS-Stato -->
      <div class="settings-section">
        <div class="status-row">
          <span id="status-dot" class="status-dot" data-state="searching" aria-hidden="true"></span>
          <span id="status-text" class="status-text">Serĉas GPS...</span>
        </div>
        <p id="accuracy-text" class="accuracy-text"></p>
      </div>

      <!-- Unuo-Elektilo -->
      <div class="settings-section">
        <label class="settings-label">Unuo</label>
        <div class="unit-selector" role="group" aria-label="Mezuro-unuo">
          <button id="unit-m" class="unit-btn active" data-unit="m" aria-pressed="true">Metroj</button>
          <button id="unit-ft" class="unit-btn" data-unit="ft" aria-pressed="false">Futoj</button>
        </div>
      </div>

      <!-- Baza Alteco -->
      <div class="settings-section">
        <label class="settings-label">Baza Alteco</label>
        <div class="base-height-controls">
          <button id="btn-set-base" class="btn-secondary">Agordi Nunan kiel Bazon</button>
          <button id="btn-clear-base" class="btn-secondary" disabled>Forigi Bazon</button>
          <p id="base-height-info" class="info-text">Neniu baza alteco agordita</p>
        </div>
      </div>

      <!-- Temo -->
      <div class="settings-section">
        <label class="settings-label">Temo</label>
        <div class="theme-selector" role="group" aria-label="Temo">
          <button id="theme-auto" class="theme-btn active" data-theme="auto" aria-pressed="true">Aŭtomata</button>
          <button id="theme-light" class="theme-btn" data-theme="light" aria-pressed="false">Hela</button>
          <button id="theme-dark" class="theme-btn" data-theme="dark" aria-pressed="false">Malhela</button>
        </div>
      </div>

      <!-- Historio kaj Statistikoj -->
      <div class="settings-section">
        <label class="settings-label">Historio</label>
        <button id="btn-view-history" class="btn-secondary">Vidi Historion</button>
      </div>

      <!-- Instalo -->
      <div id="install-section" class="settings-section hidden">
        <label class="settings-label">Instali Aplikaĵon</label>
        <button id="btn-install" class="btn-primary">Instali Gova</button>
        <p class="info-text">Instalu por pli rapida aliro kaj offline-uzo</p>
      </div>

      <!-- Ferma Butono -->
      <button id="btn-close-settings" class="btn-primary">Fermi</button>

    </div>
  </div>

  <!-- Toasto por sciigoj -->
  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="js/storage.js"></script>
  <script src="js/units.js"></script>
  <script src="js/history.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/install.js"></script>
  <script src="js/gps.js"></script>
  <script src="js/app.js"></script>
  <script src="js/sw-register.js"></script>

</body>
</html>
