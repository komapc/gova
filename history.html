<!DOCTYPE html>
<html lang="eo">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1VVXHTP77"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E1VVXHTP77');
  </script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/history.css" />
  <title>Historio — Gova</title>
</head>
<body>

  <header class="history-header">
    <button id="btn-back" class="btn-icon" data-i18n-aria="back">←</button>
    <h1 data-i18n="historyTitle">Alteco-Historio</h1>
    <button id="btn-menu" class="btn-icon" aria-label="Menuo">⋮</button>
  </header>

  <main class="history-main">
    
    <!-- Periodo-Elektilo -->
    <div class="period-selector">
      <button class="period-btn active" data-period="24">24h</button>
      <button class="period-btn" data-period="168">7d</button>
      <button class="period-btn" data-period="720">30d</button>
      <button class="period-btn" data-period="all">all</button>
    </div>

    <!-- Statistikoj -->
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-label" data-i18n="min">Minimuma</div>
        <div id="stat-min" class="stat-value">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="max">Maksimuma</div>
        <div id="stat-max" class="stat-value">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="avg">Averaĝa</div>
        <div id="stat-avg" class="stat-value">—</div>
      </div>
      <div class="stat-card">
        <div class="stat-label" data-i18n="range">Amplekso</div>
        <div id="stat-range" class="stat-value">—</div>
      </div>
    </div>

    <!-- Grafiko -->
    <div class="chart-container">
      <canvas id="altitude-chart"></canvas>
    </div>

    <!-- Neniu Datumoj -->
    <div id="no-data" class="no-data hidden">
      <p data-i18n="noHistory">Neniu historio-datumoj ankoraŭ</p>
      <p class="info-text" data-i18n="historyDesc">Datumoj kolektiĝos aŭtomate dum vi uzas la aplikaĵon</p>
    </div>

  </main>

  <!-- Menuo-Folio -->
  <div id="menu-overlay" class="menu-overlay hidden">
    <div class="menu-sheet">
      <button id="btn-export-json" class="menu-item">
        <span data-i18n="exportJson">Eksporti JSON</span>
      </button>
      <button id="btn-export-csv" class="menu-item">
        <span data-i18n="exportCsv">Eksporti CSV</span>
      </button>
      <button id="btn-clear-history" class="menu-item danger">
        <span data-i18n="clearHistory">Forigi Historion</span>
      </button>
      <button id="btn-close-menu" class="menu-item">
        <span data-i18n="cancel">Nuligi</span>
      </button>
    </div>
  </div>

  <script src="js/storage.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/units.js"></script>
  <script src="js/history.js"></script>
  <script src="js/chart.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/history-page.js"></script>

</body>
</html>
