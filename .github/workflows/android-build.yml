name: Build Android App Bundle (AAB)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'gova-android/**'
  workflow_dispatch: # Permesas mane lanĉi la konstruon el GitHub

jobs:
  build:
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./gova-android

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
        
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      # If gradlew is missing, this will fail, so let's generate it
      continue-on-error: true

    - name: Setup Gradle Wrapper
      if: hashFiles('gradlew') == ''
      run: gradle wrapper
      
    - name: Generate Release Keystore
      run: |
        keytool -genkey -v -keystore gova-release.keystore -alias gova -keyalg RSA -keysize 2048 -validity 10000 -storepass "govapassword" -keypass "govapassword" -dname "CN=Koma PC, OU=Gova, O=Gova, L=City, ST=State, C=US"
        
    - name: Build Release AAB
      run: ./gradlew bundleRelease
      
    - name: Upload AAB Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gova-release-aab
        path: gova-android/app/build/outputs/bundle/release/app-release.aab
        retention-days: 7
