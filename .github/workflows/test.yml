name: Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      run: npm install
    
    - name: Setup test environment
      run: |
        echo "Tests require browser environment"
        echo "Opening tests/run-tests.html in browser for manual testing"
    
    - name: Lint check (if applicable)
      run: echo "No linting configured yet"
      
    - name: Build check
      run: |
        echo "Checking if all files exist..."
        test -f index.html
        test -f history.html
        test -f js/app.js
        test -f js/history.js
        test -f js/chart.js
        test -f js/theme.js
        test -f js/install.js
        test -f css/main.css
        test -f css/history.css
        test -f gova-android/gradle.properties
        test -f gova-android/app/build.gradle
        test -f gova-android/app/src/main/AndroidManifest.xml
        echo "All files present!"
    
    - name: Test summary
      run: |
        echo "✅ File structure validated"
        echo "📝 For full test suite, open tests/run-tests.html in a browser"
        echo "🧪 27 tests available (13 Units + 14 Storage)"
