<!DOCTYPE html>
<html lang="eo">
<head>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-E1VVXHTP77"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-E1VVXHTP77');
  </script>
  
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#2563EB" />
  <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/history.css" /> <!-- Reuzas stilojn de historio -->
  <style>
    .points-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .point-card {
      background: var(--bg-secondary);
      padding: 1rem;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .point-info {
      flex: 1;
    }
    .point-name {
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 0.25rem;
      font-size: 1.125rem;
    }
    .point-meta {
      font-size: 0.875rem;
      color: var(--text-secondary);
    }
    .point-altitude {
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--accent-color);
      font-family: monospace;
      margin-left: 1rem;
    }
    .point-actions {
      display: flex;
      gap: 0.5rem;
      margin-left: 1rem;
    }
    .btn-small {
      padding: 0.5rem;
      border: none;
      background: var(--bg-hover);
      color: var(--text-primary);
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.875rem;
    }
    .btn-small:hover {
      background: var(--bg-active);
    }
    .btn-delete {
      color: #EF4444;
    }
  </style>
  <title>Konservitaj Punktoj — Gova</title>
</head>
<body>

  <header class="history-header">
    <button id="btn-back" class="btn-icon" aria-label="Reen">←</button>
    <h1>Konservitaj Punktoj</h1>
    <div></div> <!-- Spacer -->
  </header>

  <main class="history-main">
    
    <div id="points-list" class="points-list">
      <!-- Punktoj aperos ĉi tie -->
    </div>

    <!-- Neniu Datumoj -->
    <div id="no-data" class="no-data hidden">
      <p>Neniu konservita punkto ankoraŭ</p>
      <p class="info-text">Vi povas konservi punktojn el la ĉefa ekrano</p>
    </div>

  </main>

  <script src="js/storage.js"></script>
  <script src="js/units.js"></script>
  <script src="js/saved-points.js"></script>
  <script src="js/theme.js"></script>
  <script>
    (() => {
      'use strict';

      const elPointsList = document.getElementById('points-list');
      const elNoData = document.getElementById('no-data');
      const elBtnBack = document.getElementById('btn-back');

      let currentUnit = Storage.getUnit();

      Theme.init();

      function renderPoints() {
        const points = SavedPoints.getAll();
        
        if (points.length === 0) {
          elNoData.classList.remove('hidden');
          elPointsList.innerHTML = '';
          return;
        }

        elNoData.classList.add('hidden');
        elPointsList.innerHTML = points.reverse().map(point => {
          const formatted = Units.formatAltitude(point.altitude, currentUnit, false);
          const date = new Date(point.timestamp).toLocaleString('eo', { 
            day: '2-digit', 
            month: '2-digit', 
            year: 'numeric',
            hour: '2-digit', 
            minute: '2-digit' 
          });

          return `
            <div class="point-card" data-id="${point.id}">
              <div class="point-info">
                <div class="point-name">${point.name}</div>
                <div class="point-meta">${date} | ${point.latitude.toFixed(4)}, ${point.longitude.toFixed(4)}</div>
              </div>
              <div class="point-altitude">${formatted.value} ${formatted.unit}</div>
              <div class="point-actions">
                <button class="btn-small btn-rename" title="Renomi">✏️</button>
                <button class="btn-small btn-delete" title="Forigi">🗑️</button>
              </div>
            </div>
          `;
        }).join('');

        // Okazaĵ-aŭskultiloj por butonoj
        document.querySelectorAll('.btn-delete').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const id = parseInt(e.target.closest('.point-card').dataset.id);
            if (confirm('Ĉu vi certas ke vi volas forigi ĉi tiun punkton?')) {
              SavedPoints.remove(id);
              renderPoints();
            }
          });
        });

        document.querySelectorAll('.btn-rename').forEach(btn => {
          btn.addEventListener('click', (e) => {
            const card = e.target.closest('.point-card');
            const id = parseInt(card.dataset.id);
            const oldName = card.querySelector('.point-name').textContent;
            const newName = prompt('Nova nomo:', oldName);
            if (newName && newName.trim()) {
              SavedPoints.rename(id, newName.trim());
              renderPoints();
            }
          });
        });
      }

      elBtnBack.addEventListener('click', () => {
        window.location.href = 'index.html';
      });

      renderPoints();
    })();
  </script>

</body>
</html>
