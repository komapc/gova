<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg_grad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#2563EB"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="100%" height="100%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Fono sen rondigitaj anguloj por maskable -->
  <rect width="512" height="512" fill="url(#bg_grad)"/>
  
  <!-- Monto kun ombro -->
  <g filter="url(#shadow)">
    <!-- Ĉefa monto -->
    <path d="M256 120L400 360H112L256 120Z" fill="white"/>
    <!-- Detalo/Valo -->
    <path d="M256 190L330 310H182L256 190Z" fill="#2563EB" opacity="0.8"/>
    <!-- Pli malgranda detalo -->
    <path d="M256 260L290 310H222L256 260Z" fill="white" opacity="0.6"/>
  </g>
</svg>
